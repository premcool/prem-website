# Add this service to your existing docker-compose.yml file

  # --------------------------------------------
  # PREM SAKTHEESH WEBSITE - Next.js
  # --------------------------------------------
  prem-website:
    build:
      context: ./prem-website
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
    container_name: prem-website
    restart: always
    env_file: .env.premwebsite
    environment:
      - VIRTUAL_HOST=prems.in,www.prems.in
      - LETSENCRYPT_HOST=prems.in,www.prems.in
      - LETSENCRYPT_EMAIL=prem@prems.in
      - VIRTUAL_PORT=3000
      - NODE_ENV=production
      - NODE_OPTIONS="--max-old-space-size=4096"
      - NEXT_TELEMETRY_DISABLED=1
    expose:
      - "3000"
    volumes:
      - prem-website-data:/app/.next
      - prem-website-content:/app/content
      - prem-website-data-storage:/app/data
    networks:
      - web

# Add these volumes to your volumes section:
#   prem-website-data:
#   prem-website-content:
#   prem-website-data-storage: